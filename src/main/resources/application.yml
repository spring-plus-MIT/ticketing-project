spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ticket-topia?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update           # 개발 중: update / 운영: none 또는 validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

jwt:
  secret: your-secret-key-must-be-at-least-32-characters-long   # 최소 32자 이상 권장 (HS256 기준)
  access-token-expiration: 1800000     # 30분 (ms)
  refresh-token-expiration: 604800000  # 7일 (ms)

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
    org.springframework.security: debug