spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.redisson.spring.starter.RedissonAutoConfiguration
  cloud:
    aws:
      parameterstore:
        enabled: true
      secretsmanager:
        enabled: false
  config:
    import:
      - aws-parameterstore:/ticketing-app/prod/
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

jwt:
  secret:
    key: ${JWT_SECRET_KEY}

logging:
  level:
    root: warn

info:
  app:
    message: ${APP_MESSAGE}

management:
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true
