spring:
  cloud:
    aws:
      parameterstore:
        enabled: false
      secretsmanager:
        enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: redis
      port: 6379

jwt:
  secret:
    key: ${JWT_SECRET}
  expiration: 1800000

super-admin:
  email: ${SUPER_ADMIN_ID}
  password: ${SUPER_ADMIN_PASSWORD}